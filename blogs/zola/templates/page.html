{% extends "base.html" %}

{% block title %}{{ page.title }} — {{ config.title }}{% endblock title %}

{% block content %}
  <article>
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.date }}">{{ page.date | date(format="%B %d, %Y") }}</time>
    {{ page.content | safe }}
  </article>
{% endblock content %}
