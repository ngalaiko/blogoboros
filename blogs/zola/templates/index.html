{% extends "base.html" %}

{% block content %}
  <ul class="post-list">
    {% for page in section.pages %}
    <li>
      <time datetime="{{ page.date }}">{{ page.date | date(format="%B %d, %Y") }}</time>
      <a href="{{ page.permalink | safe }}">{{ page.title }}</a>
    </li>
    {% endfor %}
  </ul>
{% endblock content %}
