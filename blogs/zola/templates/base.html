<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock title %}</title>
  <meta name="description" content="{{ config.description }}">
  <link rel="stylesheet" href="{{ get_url(path="style.css") }}">
</head>
<body>
  <div class="blogoboros-banner" data-moved-to="/">
    This blog has moved. Read it at <a href="/">its new home</a>.
  </div>
  <header>
    <a class="site-title" href="{{ config.base_url }}/">{{ config.title }}</a>
    <p class="site-tagline">{{ config.description }}</p>
  </header>
  <main>
    {% block content %}{% endblock content %}
  </main>
  <footer>
    <p>&copy; 2024 {{ config.extra.author }} &middot; built with <a href="https://www.getzola.org">Zola</a> &middot; no JavaScript was shipped in the making of this blog</p>
  </footer>
</body>
</html>
